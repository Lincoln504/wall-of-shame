<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Discourage caching the HTML doc itself (hashed assets stay immutable). The reliable
         mechanism is the focus-time entry-bundle check in index.tsx; this is a cheap hint. -->
    <meta http-equiv="Cache-Control" content="no-cache" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=17" />
    <title>Wall of Shame</title>
    <meta name="description" content="A repository of web content judged to be harmful, and why — propaganda and op-eds whose framing normalizes, justifies, or hides the harm of regressive policies. Each entry is dissected with a scathing, evidence-grounded analysis." />
    <!-- Open Graph / social link unfurls. Hash routes (#/page/N) are invisible to
         crawlers, so every shared link unfurls with this single site-wide card. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wall of Shame" />
    <meta property="og:title" content="Wall of Shame" />
    <meta property="og:description" content="Propaganda and op-eds that normalize, justify, or hide the harm of regressive policies — each dissected with a scathing, evidence-grounded analysis." />
    <meta property="og:url" content="https://wallofshame.io/" />
    <meta property="og:image" content="https://wallofshame.io/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wall of Shame" />
    <meta name="twitter:description" content="Propaganda and op-eds that normalize, justify, or hide the harm of regressive policies — each dissected with a scathing, evidence-grounded analysis." />
    <!-- GitHub Pages SPA redirect: decode path encoded by 404.html back to real URL. -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '&' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      /* Clip horizontal overflow on BOTH html and body so the document can never be wider than the
         viewport. Without the html-level clip, the full-bleed feed could make the page horizontally
         pannable on mobile — which showed up as "not starting fully zoomed out" and a slight
         off-centre/extra right margin once zoomed out. `clip` (not `hidden`) is used so neither axis
         is coerced into a scroll container — vertical page scroll stays untouched. */
      html { font-size: 16px; overflow-x: clip; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f9f9f7;
        color: #1a1a1a;
        min-height: 100vh;
        line-height: 1.5;
        overflow-x: clip;
      }
      #root { min-height: 100vh; }
      /* Mobile refinements (inline styles set these per-element, so !important is required to
         override on small screens): tighter body line-spacing, and a title small enough that
         "Wall of Shame" + the icon read as one balanced, centered unit instead of wrapping with
         the icon stranded to the right. */
      @media (max-width: 600px) {
        /* Body paragraphs (description + analysis): slightly tighter line spacing AND a slightly
           smaller gap between paragraphs — subtle, mobile only. Inline styles set both, so the
           line-height and margin-bottom overrides need !important. */
        .wos-justify { font-size: 0.95rem !important; line-height: 1.4 !important; margin-bottom: 0.8rem !important; }
        .wos-analysis { font-size: 0.875rem !important; line-height: 1.42 !important; margin-bottom: 0.45rem !important; }
        .wos-title { font-size: 2rem !important; }
        .wos-home { gap: 0.5rem !important; }
        /* Analysis box on mobile: same shading idea, but a full-width band — it reaches the card's
           left/right edges instead of sitting inset, drops the left accent rule, and uses a slightly
           deeper shade so the section still reads without that rule. Negative margins equal to the
           feed card's 1.4rem horizontal padding pull it to the edges; the box keeps 1.4rem inner
           padding so its text stays aligned with the description above. */
        /* Analysis section on mobile: a fully-enclosed bordered box — 3px rule (the desktop accent
           color) on ALL FOUR sides. It sits INSET within the card's content area (no edge breakout)
           so card-white shows around it and every side of the border is clearly visible. Identical
           in the feed and the search/list cards, so the section looks the same in both views (this
           also removes the old full-bleed margin that differed by card padding and left search cards
           looking inconsistently inset). */
        .wos-analysis-box {
          background: #f0ede6 !important;
          border: 3px solid #e4e1d9 !important;
          border-radius: 2px !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/index.tsx"></script>
  </body>
</html>
