<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="white"/>
  <g transform="translate(3.2, 0) rotate(25, 16, 16)">
    <text x="16" y="20" font-size="18" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">📌</text>
  </g>
  <!-- Clip the pin's point: a white box filling the LEFT interior half (inside the border,
       right edge on the vertical centre line), painted ON TOP of the pin so everything left
       of centre is masked out. Sits within x∈[4,16], y∈[4,28] so it never touches the border. -->
  <rect x="4" y="4" width="12" height="24" fill="white"/>
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#1a1a1a" stroke-width="4"/>
</svg>
